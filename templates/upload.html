<!DOCTYPE html>
<html>
<head>
    <title>Carica Dati Diplomi6.6</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        h1 { color: #333; }
        form { margin-top: 20px; }
        input[type="file"] { margin-bottom: 10px; }
        input[type="submit"] {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Carica il File dei Dati dei Diplomi</h1>
    <form action="/upload-data" method="post" enctype="multipart/form-data">
        <input type="file" name="data_file" accept=".txt">
        <br>
        <input type="submit" value="Genera PDF e Anteprima">
    </form>
</body>
</html>
